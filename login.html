<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | User Access</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .login-container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 300px; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>
        <form action="authenticate.php" method="POST">
            <label>Phone Number</label>
            <input type="text" name="phone_number" required placeholder="e.g. 1234567890">
            
            <label>Confirmation Code</label>
            <input type="password" name="confirmation_code" required>
            
            <button type="submit">Access Account</button>
        </form>
    </div>
</body>
</html>
